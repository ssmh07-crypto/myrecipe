version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      root-dependencies:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /apps/mobile
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      mobile-dependencies:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
